<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#0c0b09">
<script>
  // Apply the saved (or system-preferred) theme before first paint to avoid a flash.
  (function () {
    try {
      var root = document.documentElement;
      var accent = localStorage.getItem('fpl_accent');
      if (accent !== 'aurum' && accent !== 'frost' && accent !== 'verdant') accent = 'aurum';
      var mode = localStorage.getItem('fpl_mode');
      if (mode !== 'light' && mode !== 'dark') {
        mode = window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
      }
      root.dataset.accent = accent;
      root.dataset.mode = mode;
    } catch (e) {
      document.documentElement.dataset.accent = 'aurum';
      document.documentElement.dataset.mode = 'dark';
    }
  })();
</script>
<script>
  // 1) Purge the pre-migration service worker and its caches. A zombie legacy
  //    worker (script now deleted → 404 on update checks) can fall back to the
  //    OLD cached shell on a slow network, whose js/ files no longer exist —
  //    a broken page until refresh. Kill it and its 'fpl-analyser-*' caches.
  (function () {
    try {
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function (regs) {
          regs.forEach(function (reg) {
            var sw = reg.active || reg.waiting || reg.installing;
            if (sw && /service-worker\.js/.test(sw.scriptURL)) reg.unregister();
          });
        }).catch(function () {});
      }
      if (window.caches && caches.keys) {
        caches.keys().then(function (keys) {
          keys.forEach(function (k) { if (k.indexOf('fpl-analyser-') === 0) caches.delete(k); });
        }).catch(function () {});
      }
    } catch (e) { /* best effort */ }
  })();

  // Collect runtime errors from the very start so the #/debug page can show
  // them even when they happen before React mounts.
  (function () {
    window.__errlog = [];
    function log(kind, msg) {
      if (window.__errlog.length < 30) window.__errlog.push(new Date().toISOString().slice(11, 19) + ' [' + kind + '] ' + msg);
    }
    window.addEventListener('error', function (e) {
      log('error', (e.message || 'unknown') + (e.filename ? ' @ ' + e.filename.split('/').pop() + ':' + e.lineno : ''));
    });
    window.addEventListener('unhandledrejection', function (e) {
      var r = e.reason; log('promise', (r && (r.message || String(r))) || 'unknown');
    });
  })();

  // 2) Start the core data downloads NOW, during HTML parse — the app's data
  //    layer picks these promises up, cutting the JS-download-then-fetch chain
  //    out of the critical path (worth seconds on a phone connection).
  (function () {
    try {
      // Data is namespaced by season (site_data/<season>/…). Resolve the active
      // season synchronously so the eager fetches hit the right folder. Default
      // is the season current at build time; a stored choice overrides it, and
      // switching seasons reloads the page. (Update the default at rollover.)
      var season = '2025-26';
      try { var stored = localStorage.getItem('fpl_season'); if (stored) season = stored; } catch (e) {}
      window.__season = season;
      window.__early = {};
      [
        'ratings', 'personas_4gw', 'advanced_metrics', 'team_metrics',
        'season_to_date', 'player_tiers', 'fixture_ease', 'meta',
        'benchmarks', 'replacement_pool', 'persona_shifts', 'price_risk', 'player_form', 'teams'
      ].forEach(function (n) {
        window.__early[n] = fetch('site_data/' + season + '/' + n + '.json');
        window.__early[n].catch(function () {}); // avoid unhandled-rejection noise
      });
    } catch (e) { /* the data layer falls back to its own fetches */ }
  })();
</script>
